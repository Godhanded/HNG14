user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── JSON Log Format ────────────────────────────────────────────────────
    # We define a custom JSON log format so our Python detector can parse
    # each line with json.loads() instead of regex.
    # escape=json tells nginx to escape special characters inside values.
    log_format json_log escape=json
        '{'
            '"timestamp":"$time_iso8601",'
            '"source_ip":"$remote_addr",'
            '"x_forwarded_for":"$http_x_forwarded_for",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"response_size":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"user_agent":"$http_user_agent",'
            '"host":"$host"'
        '}';

    # Write access logs in JSON format to the shared Docker volume.
    # The detector reads this file in real time.
    # buffer=4k sets a 4KB write buffer; flush=1s forces it to disk every second
    # Both are required together — flush alone is invalid nginx syntax
    access_log  /var/log/nginx/hng-access.log  json_log  buffer=4k  flush=1s;
    error_log   /var/log/nginx/error.log  warn;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name _;   # Match any hostname

        # ── Real IP Extraction ──────────────────────────────────────────────
        # Since your HOST nginx sits in front of this Docker nginx, $remote_addr
        # would be the host's docker gateway IP (e.g. 172.17.0.1), not the real
        # client. These directives tell nginx to trust the X-Forwarded-For header
        # from upstream proxies and replace $remote_addr with the actual client IP.
        set_real_ip_from  172.16.0.0/12;    # Docker bridge networks
        set_real_ip_from  10.0.0.0/8;       # Private ranges
        set_real_ip_from  127.0.0.1;        # Localhost
        real_ip_header    X-Forwarded-For;
        real_ip_recursive on;               # Strip our own proxy IPs from the chain

        # ── Proxy to Nextcloud ──────────────────────────────────────────────
        location / {
            proxy_pass         http://nextcloud:80;

            # Forward the real client IP to Nextcloud
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Required for Nextcloud file uploads (large bodies)
            client_max_body_size 10G;
            proxy_buffering          off;
            proxy_request_buffering  off;

            # Increase timeouts for large uploads
            proxy_connect_timeout    60s;
            proxy_send_timeout       3600s;
            proxy_read_timeout       3600s;
        }
    }
}
